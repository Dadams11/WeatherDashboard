<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>

  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
    crossorigin="anonymous"
  />

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header id="header" class="jumbotron jumbotron-fluid mb-0">
    <div class="container">
      <h1 id="header-text" class="text-center">Weather Dashboard</h1>
    </div>
  </header>

  <main id="content" class="container my-4">
    <div class="row">
      <section id="content-left" class="col-md-4 col-lg-3 mb-4">
        <form id="weather-form">
          <div class="form-group">
            <label for="cityInput">Search for a City:</label>
            <input
              id="cityInput"
              class="form-control"
              type="text"
              name="city"
              placeholder="Enter a city name"
            />
          </div>

          <button id="searchButton" class="btn btn-primary btn-block" type="submit">
            Search
          </button>
        </form>

        <div id="search-error" aria-live="polite"></div>

        <div class="mt-4">
          <h3 class="h5 mb-3">Search History</h3>
          <div id="buttonContainer"></div>
        </div>

        <a id="clear-storage" href="#" class="d-inline-block mt-3">Clear History</a>
      </section>

      <section id="content-right" class="col-md-8 col-lg-9">
        <div id="weatherInfo" class="mb-4"></div>

        <h2 class="mb-3">5-Day Forecast</h2>
        <div id="five-day-forecast"></div>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
    integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
    integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
    crossorigin="anonymous"
  ></script>

  <script src="assets/script.js"></script>
</body>
</html>
